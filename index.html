<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Buscador de peliculas y series con chatboot.">
    <meta name="robots" content="index, follow">
    <meta name="keywords" content="peliculas, series, chatbot, buscar">
    <meta property="og:title" content="Buscador de Peliculas y Series con Chatbot">
    <meta property="og:description" content="Buscador de Peliculas y Series con Chatbot.">
    <meta property="og:image" content="img/tvmaze-icon.png">
    <title>PRACTICA 24</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link 
        href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@300;400;500;700&family=Lexend:wght@300;400;500;700&family=Rubik:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css"/>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <header>
        <img src="img/tvmaze-icon.png" alt="Logo de TV MAZE" id="logo-movies" />
        <h1>TVMAZE</h1>
    </header>
    <section class="search-container">
        <input type="text" id="shows-search" placeholder="Buscar Serie." aria-label="Campo de búsqueda de series y peliculas" required />
        <button id="search-button" aria-label="Boton para Buscar" >Buscar</button>
    </section>
    <button id="chatToggleBtn" class="chat-toggle-btn" aria-label="Boton abrir para Chatboot">💬</button>
    <article class="chat-container idden" id="chatContainer">
        <section class="chat-header">
            <h2>Asistente Virtual</h2>
            <button id="closeChatBtn" class="close-btn" aria-label="Cerrar Chatboot">✖</button>
        </section>
        <section class="chat-box" id="chatBox">
            <div class="message bot-message">¡Hola! ¿En qué puedo ayudarte hoy?</div>
        </section>
        <section class="chat-input-area">
            <input type="text" id="userInput" placeholder="Escribe un mensaje..." autocomplete="off" aria-label="Campo de entrada para el mensaje del usuario">
            <button id="sendBtn" aria-label="Boton para Enviar">Enviar</button>
        </section>
    </article>
    <main class="show-grid" id="show-grid">
    </main>
    <script src="js/main.js"></script>
    <footer>
        <p>UBALDO ZOE COMPANY. &reg;</p>
    </footer>
</body>
</html>
